/* ----------------------------------------------------------------
   Armazenamento (localStorage com fallback em memória)
-----------------------------------------------------------------*/
const STORE_KEY = 'recuperacao-capilar-v1';
let memoryStore = null;
function loadState() {
  try { const raw = window.localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
  catch (e) { return memoryStore; }
}
function saveState(state) {
  memoryStore = state;
  try { window.localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {}
}

/* ----------------------------------------------------------------
   Armazenamento de fotos (IndexedDB — aguenta imagens)
-----------------------------------------------------------------*/
const PHOTO_DB = 'recup-fotos';
const PHOTO_STORE = 'fotos';
function openPhotoDB() {
  return new Promise((resolve, reject) => {
    if (!('indexedDB' in window)) return reject(new Error('sem indexedDB'));
    const req = indexedDB.open(PHOTO_DB, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(PHOTO_STORE, { keyPath: 'id' }); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function photoAdd(photo) {
  const db = await openPhotoDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).put(photo);
    tx.oncomplete = () => res(true); tx.onerror = () => rej(tx.error);
  });
}
async function photoDelete(id) {
  const db = await openPhotoDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(PHOTO_STORE, 'readwrite');
    tx.objectStore(PHOTO_STORE).delete(id);
    tx.oncomplete = () => res(true); tx.onerror = () => rej(tx.error);
  });
}
async function photoAll() {
  const db = await openPhotoDB();
  return new Promise((res, rej) => {
    const out = [];
    const tx = db.transaction(PHOTO_STORE, 'readonly');
    const cur = tx.objectStore(PHOTO_STORE).openCursor();
    cur.onsuccess = (e) => { const c = e.target.result; if (c) { out.push(c.value); c.continue(); } else res(out); };
    cur.onerror = () => rej(cur.error);
  });
}
/* redimensiona a imagem antes de guardar (economiza espaço) */
function compressImage(file, maxSide = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let { width: w, height: h } = img;
      if (Math.max(w, h) > maxSide) { const r = maxSide / Math.max(w, h); w = Math.round(w * r); h = Math.round(h * r); }
      const c = document.createElement('canvas'); c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('imagem inválida')); };
    img.src = url;
  });
}

-----------------------------------------------------------------*/
function midnight(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function daysSince(dateStr) {
  if (!dateStr) return 0;
  const s = new Date(dateStr + 'T00:00:00');
  return Math.floor((midnight(new Date()) - midnight(s)) / 86400000);
}
function addDays(dateStr, n) {
  const s = new Date(dateStr + 'T00:00:00'); s.setDate(s.getDate() + n);
  return s.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
}
function fmtRange(start, end) {
  if (end == null) return `a partir do dia ${start}`;
  if (start === end) return `dia ${start}`;
  return `dias ${start}–${end}`;
}
function nowHM() {
  const d = new Date();
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');

const CHECKABLE = ['daily', 'med'];
const reqDoses = t => t.times || 1;
const maxDoses = t => t.maxTimes || reqDoses(t);
const isDose = t => t.mode === 'dose';
const isState = t => t.mode === 'state';

function isActiveOn(t, day) {
  if (t.kind === 'milestone') return t.start === day;
  if (CHECKABLE.includes(t.kind) || t.kind === 'advisory') {
    const end = t.end == null ? Infinity : t.end;
    return day >= t.start && day <= end;
  }
  return false;
}
const topKey = (t, day) => t.kind === 'milestone' ? t.id : `${t.id}#${day}`;
const doseKey = (t, day, i) => `${t.id}#${day}#${i}`;

/* status de um item no dia: { state, done, total } */
function statusFor(t, day, log) {
  const top = log[topKey(t, day)];
  if (isSkipVal(top)) return { state: 'skip', done: 0, total: t.kind === 'milestone' ? 1 : reqDoses(t) };
  if (t.kind === 'milestone') return { state: isDoneVal(top) ? 'done' : 'pending', done: isDoneVal(top) ? 1 : 0, total: 1 };
  if (isState(t)) return { state: isDoneVal(top) ? 'done' : 'pending', done: isDoneVal(top) ? 1 : 0, total: 1 };
  // dose
  const total = reqDoses(t);
  if (isDoneVal(top)) return { state: 'done', done: total, total };
  const max = maxDoses(t);
  let cnt = 0;
  for (let i = 0; i < max; i++) if (isDoneVal(log[doseKey(t, day, i)])) cnt++;
  const state = cnt === 0 ? 'pending' : (cnt >= total ? 'done' : 'partial');
  return { state, done: cnt, total };
}

/* próxima dose ~HH:MM (último horário registrado + intervalo), se ainda faltam doses */
function nextDoseHint(t, day, log) {
  if (!isDose(t) || !t.intervalH) return null;
  const st = statusFor(t, day, log);
  if (st.state === 'done' || st.state === 'skip') return null;
  let last = null;
  for (let i = 0; i < maxDoses(t); i++) {
    const v = log[doseKey(t, day, i)];
    if (isTimeVal(v) && (last === null || v > last)) last = v;
  }
  if (!last) return null;
  const [h, m] = last.split(':').map(Number);
  let total = h * 60 + m + t.intervalH * 60;
  total = ((total % 1440) + 1440) % 1440;
  const nh = String(Math.floor(total / 60)).padStart(2, '0');
  const nm = String(total % 60).padStart(2, '0');
  return `${nh}:${nm}`;
}

function ProgressRing({ value = 0, size = 56 }) {
  const r = (size - 8) / 2, c = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="-rotate-90">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#DCDFD8" strokeWidth="5" />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#5E7A66" strokeWidth="5"
        strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c * (1 - value)}
        style={{ transition: 'stroke-dashoffset .5s ease' }} />
    </svg>
  );
}

function SkipToggle({ skipped, onToggle }) {
  return (
    <button onClick={onToggle} aria-pressed={skipped}
      className={`shrink-0 text-[12px] font-semibold px-2.5 py-1 rounded-lg border transition inline-flex items-center gap-1

      {skipped && <Icon d={icons.check} size={12} stroke={2.6} />}
      Não fiz

  );
}

/* Doses com horário: cada repetição vira um chip (marca a hora atual; editável) */
function DoseControls({ t, day, log, setLog }) {
  const required = reqDoses(t);
  const max = maxDoses(t);
  let highest = required - 1;
  for (let i = 0; i < max; i++) if (log[doseKey(t, day, i)] != null) highest = Math.max(highest, i);
  const slotsCount = Math.max(required, highest + 1);
  const slots = Array.from({ length: slotsCount }, (_, i) => i);

  return (
    <div className="flex flex-wrap items-center gap-2">
      {slots.map(i => {
        const v = log[doseKey(t, day, i)];
        const done = isDoneVal(v);
        const time = isTimeVal(v) ? v : '';
        if (done) {
          return (
            <span key={i} className="inline-flex items-center gap-1 rounded-lg bg-sageSoft border border-sage/40 pl-2 pr-1 py-1">
              <Icon d={icons.check} size={13} stroke={2.6} className="text-sage" />
              <input type="time" value={time}
                onChange={e => setLog(doseKey(t, day, i), e.target.value || 'done')}
                aria-label={`Horário da ${required > 1 ? `${i+1}ª ` : ''}aplicação`}
                className="bg-transparent text-sage text-[13px] font-semibold w-[62px] focus:outline-none" />
              <button onClick={() => setLog(doseKey(t, day, i), null)} aria-label="Desmarcar esta dose"
                className="w-5 h-5 grid place-items-center text-sage/70 hover:text-sage rounded">
                <Icon d={icons.x} size={13} stroke={2.2} />
              </button>
            </span>
          );
        }
        return (
          <button key={i} onClick={() => setLog(doseKey(t, day, i), nowHM())}
            title="Marcar com a hora atual"
            className="inline-flex items-center gap-1.5 rounded-lg border border-line px-2.5 py-1.5 text-[13px] font-medium text-inkSoft hover:border-bronze hover:text-bronzeDeep transition">
            <Icon d={icons.clock} size={14} />
            {required > 1 ? `${i + 1}ª dose` : 'Marcar'}
          </button>
        );
      })}
      {slotsCount < max && (
        <button onClick={() => setLog(doseKey(t, day, slotsCount), nowHM())}
          title="Registrar uma aplicação a mais"
          className="inline-flex items-center gap-1 rounded-lg border border-dashed border-bronze/50 px-2.5 py-1.5 text-[13px] font-medium text-bronzeDeep hover:bg-bronzeSoft transition">
          <Icon d={icons.plus} size={14} /> dose
        </button>
      )}
    </div>
  );
}

/* Cartão de tarefa (Hoje + Medicamentos) */
function CareCard({ t, day, log, setLog, setTop, skipTask }) {
  const status = statusFor(t, day, log);
  const skipped = status.state === 'skip';
  const done = status.state === 'done';
  const partial = status.state === 'partial';
  const hint = nextDoseHint(t, day, log);

  const bg = skipped ? 'bg-porcelain border-line opacity-80'
    : done ? 'bg-sageSoft/60 border-sage/30'
    : partial ? 'bg-mist border-bronze/40'
    : 'bg-mist border-line';

  return (
    <div className={`rounded-xl border px-4 py-3.5 transition ${bg}`}>
      <div className="flex items-start gap-3">
        <span className={`mt-0.5 shrink-0 w-6 h-6 rounded-md grid place-items-center
          ${done ? 'bg-sage text-white' : skipped ? 'bg-inkSoft/15 text-inkSoft' : 'bg-bronzeSoft text-bronzeDeep'}`}>
          <Icon d={done ? icons.check : skipped ? icons.x : (isDose(t) ? icons.clock : icons.check)} size={14} stroke={2.2} />
        </span>
        <div className="min-w-0 flex-1">
          <div className="flex items-center gap-2 flex-wrap">
            <span className={`text-[15px] font-medium leading-tight ${done ? 'text-sage' : skipped ? 'text-inkSoft line-through' : 'text-ink'}`}>{t.title}</span>
            {t.tag && <span className="text-[11px] font-semibold uppercase tracking-wide text-bronzeDeep bg-bronzeSoft px-1.5 py-0.5 rounded">{t.tag}</span>}
            {isDose(t) && status.total > 1 && !skipped && (
              <span className="text-[11px] font-semibold text-inkSoft">{status.done}/{status.total}</span>
            )}
          </div>
          <p className="text-[13px] text-inkSoft mt-1 leading-snug">{t.detail}</p>
        </div>
        <SkipToggle skipped={skipped} onToggle={() => skipTask(t, day)} />
      </div>

      {!skipped && (
        <div className="mt-3 pl-9">
          {isDose(t)
            ? <>
                <DoseControls t={t} day={day} log={log} setLog={setLog} />
                {hint && (
                  <p className="mt-2 text-[12.5px] text-bronzeDeep font-medium flex items-center gap-1.5">
                    <Icon d={icons.bell} size={13} /> Próxima dose por volta de {hint}
                  </p>
                )}
              </>
            : (
              <button onClick={() => setTop(t, day, done ? null : 'done')}
                className={`inline-flex items-center gap-1.5 rounded-lg px-3 py-1.5 text-[13px] font-semibold border transition
                  ${done ? 'bg-sage border-sage text-white' : 'border-line text-ink hover:border-bronze hover:text-bronzeDeep'}`}>
                <Icon d={icons.check} size={14} stroke={2.4} /> {done ? 'Feito' : 'Marcar como feito'}
              </button>
            )}
        </div>
      )}
    </div>
  );
}

/* ----------------------------------------------------------------

-----------------------------------------------------------------*/
function HojeView({ day, today, setViewDay, surgeryDate, log, setLog, setTop, skipTask }) {
  const phase = phaseForDay(day);
  const todayTasks = useMemo(() => CARE.filter(t => CHECKABLE.includes(t.kind) && isActiveOn(t, day)), [day]);
  const todayMilestones = useMemo(() => CARE.filter(t => t.kind === 'milestone' && t.start === day), [day]);
  const advisories = useMemo(() => CARE.filter(t => t.kind === 'advisory' && isActiveOn(t, day)), [day]);

  const required = [...todayMilestones, ...todayTasks];
  const statuses = required.map(t => statusFor(t, day, log));
  const doneN = statuses.filter(s => s.state === 'done').length;
  const skipN = statuses.filter(s => s.state === 'skip').length;
  const pct = required.length ? doneN / required.length : 0;

  const nextMilestone = useMemo(() =>
    CARE.filter(t => t.kind === 'milestone' && t.start > day).sort((a, b) => a.start - b.start)[0], [day]);

  if (day < 0) {
    return (
      <div className="fade-in max-w-2xl">
        <p className="text-[13px] font-semibold uppercase tracking-[0.18em] text-bronze">Contagem</p>
        <h1 className="font-serif text-4xl text-ink mt-2">Faltam {Math.abs(day)} dia{Math.abs(day) > 1 ? 's' : ''}</h1>
        <p className="text-inkSoft mt-2">para a sua cirurgia, marcada para {addDays(surgeryDate, 0)}.</p>
      </div>
    );
  }

  return (
    <div className="fade-in space-y-7 max-w-2xl">
      <header>
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-1.5">
            <button onClick={() => setViewDay(Math.max(0, day - 1))} disabled={day <= 0} aria-label="Dia anterior"
              className="w-9 h-9 rounded-lg border border-line grid place-items-center text-inkSoft disabled:opacity-30 hover:border-bronze transition"><Icon d={icons.chevronLeft} size={18} /></button>
            <button onClick={() => setViewDay(Math.min(today, day + 1))} disabled={day >= today} aria-label="Próximo dia"
              className="w-9 h-9 rounded-lg border border-line grid place-items-center text-inkSoft disabled:opacity-30 hover:border-bronze transition"><Icon d={icons.chevron} size={18} /></button>
          </div>
          {day !== today && (
            <button onClick={() => setViewDay(today)} className="text-[13px] font-semibold text-bronzeDeep inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-bronze/40 hover:bg-bronzeSoft transition">
              <Icon d={icons.today} size={14} /> Voltar para hoje
            </button>
          )}
        </div>
        <p className="text-[13px] font-semibold uppercase tracking-[0.18em] text-bronze">{day === today ? 'Seu dia' : 'Registro de dia anterior'}</p>
        <h1 className="font-serif text-[3.4rem] leading-none text-ink mt-2">
          {day === 0 ? 'Dia da cirurgia' : <>Dia <span className="text-bronze">{day}</span></>}
        </h1>
        <p className="text-inkSoft mt-3">
          Fase: <span className="text-ink font-medium">{phase.label}</span>
          <span className="mx-2 text-line">·</span>
          {required.length > 0
            ? <>{doneN} de {required.length} feito{required.length > 1 ? 's' : ''}{skipN > 0 ? ` · ${skipN} não fiz` : ''}</>
            : <>nada obrigatório hoje — siga os cuidados contínuos</>}
        </p>
      </header>

      {(todayMilestones.length > 0 || nextMilestone) && (
        <section className="rounded-2xl bg-ink text-porcelain p-5 shadow-card">
          {todayMilestones.length > 0 ? (
            <>
              <p className="text-[12px] font-semibold uppercase tracking-[0.16em] text-bronzeSoft/80">Hoje é dia de</p>
              {todayMilestones.map(m => (
                <div key={m.id} className="mt-2">
                  <h2 className="font-serif text-2xl">{m.title}</h2>
                  <p className="text-porcelain/70 text-[14px] mt-1.5 leading-snug">{m.detail}</p>
                </div>
              ))}
            </>
          ) : (
            <>
              <p className="text-[12px] font-semibold uppercase tracking-[0.16em] text-bronzeSoft/80">Próximo passo</p>
              <h2 className="font-serif text-2xl mt-2">{nextMilestone.title}</h2>
              <p className="text-porcelain/70 text-[14px] mt-1.5 leading-snug">{nextMilestone.detail}</p>
              <p className="text-bronzeSoft text-[13px] mt-3 font-medium">
                Dia {nextMilestone.start} · {addDays(surgeryDate, nextMilestone.start)}
                <span className="text-porcelain/50"> · faltam {nextMilestone.start - day} dia{nextMilestone.start - day > 1 ? 's' : ''}</span>
              </p>
            </>
          )}
        </section>
      )}

      {required.length > 0 && (
        <section>
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-serif text-xl text-ink">Para fazer hoje</h3>
            <div className="flex items-center gap-2.5">
              <ProgressRing value={pct} size={42} />
              <span className="text-[13px] text-inkSoft font-medium">{Math.round(pct * 100)}%</span>
            </div>
          </div>
          <div className="space-y-2.5">
            {required.map(t => (
              <CareCard key={t.id} t={t} day={day} log={log} setLog={setLog} setTop={setTop} skipTask={skipTask} />

        <section>
          <h3 className="font-serif text-xl text-ink mb-3">Fique atento</h3>
          <div className="space-y-2.5">{advisories.map(t => <AdvisoryRow key={t.id} t={t} />)}</div>
        </section>
      )}
    </div>
  );
}

/* ----------------------------------------------------------------
   TELA · JORNADA
-----------------------------------------------------------------*/
function JornadaView({ day, surgeryDate, log, setTop }) {
  const entries = useMemo(() => {
    const list = [];
    CARE.forEach(t => {
      if (t.kind === 'milestone') list.push({ ...t, at: t.start, range: null });
      else if (CHECKABLE.includes(t.kind)) list.push({ ...t, at: t.start, range: fmtRange(t.start, t.end) });
      else if (t.kind === 'advisory') list.push({ ...t, at: t.start, range: fmtRange(t.start, t.end) });
    });
    return list.sort((a, b) => a.at - b.at || (a.kind === 'milestone' ? -1 : 1));
  }, []);

  function statusOf(e) {
    if (e.kind === 'milestone') {
      if (isSkipVal(log[e.id])) return 'naofiz';
      if (isDoneVal(log[e.id])) return 'feito';
      if (e.at === day) return 'hoje';
      if (e.at < day) return 'passou';
      return 'futuro';
    }
    const end = e.end == null ? Infinity : e.end;
    if (e.at <= day && day <= end) return 'ativo';
    if (day > end) return 'concluido';
    return 'futuro';
  }

  const palette = {
    feito: { node: 'bg-sage border-sage', text: 'text-sage', label: 'Concluído' },
    concluido: { node: 'bg-sage border-sage', text: 'text-sage', label: 'Concluído' },
    hoje: { node: 'bg-bronze border-bronze ring-4 ring-bronzeSoft', text: 'text-bronzeDeep', label: 'Hoje' },
    ativo: { node: 'bg-bronze border-bronze ring-4 ring-bronzeSoft', text: 'text-bronzeDeep', label: 'Em andamento' },
    naofiz: { node: 'bg-porcelain border-inkSoft/50', text: 'text-inkSoft', label: 'Não fiz' },
    passou: { node: 'bg-mist border-line', text: 'text-inkSoft', label: 'Passou' },
    futuro: { node: 'bg-mist border-line', text: 'text-inkSoft/60', label: 'A seguir' },
  };

  const byPhase = PHASES.map(p => ({ phase: p, items: entries.filter(e => e.at >= p.from && e.at <= p.to) })).filter(g => g.items.length);

  return (
    <div className="fade-in max-w-2xl">
      <header className="mb-7">
        <p className="text-[13px] font-semibold uppercase tracking-[0.18em] text-bronze">Sua jornada</p>
        <h1 className="font-serif text-4xl text-ink mt-2">Linha do tempo</h1>
        <p className="text-inkSoft mt-2">Da cirurgia ao acompanhamento. O ponto destacado é onde você está hoje.</p>
      </header>

      {byPhase.map(({ phase, items }) => (
        <section key={phase.id} className="mb-8">
          <div className="flex items-baseline gap-3 mb-4">
            <h2 className="font-serif text-lg text-ink">{phase.label}</h2>
            <span className="text-[12px] text-inkSoft">
              {phase.to >= 9999 ? 'a partir de 1 ano' : phase.from === phase.to ? `dia ${phase.from}` : `dias ${phase.from}–${phase.to}`}
            </span>
          </div>
          <div className="relative pl-1">
            <div className="absolute left-[12px] top-2 bottom-2 w-px bg-line" />
            <div className="space-y-1">
              {items.map((e, i) => {
                const st = statusOf(e);
                const c = palette[st];
                const isMs = e.kind === 'milestone';
                const isDoneMs = isDoneVal(log[e.id]);
                const showBtn = isMs && ['hoje', 'passou', 'feito', 'naofiz'].includes(st);
                return (
                  <div key={e.id + i} className="relative flex gap-4 py-2.5">
                    <div className="relative z-10 shrink-0">
                      <span className={`block w-[18px] h-[18px] rounded-full border-2 ${c.node} grid place-items-center text-white`}>
                        {(st === 'feito' || st === 'concluido') && <Icon d={icons.check} size={11} stroke={3} />}
                        {st === 'naofiz' && <Icon d={icons.x} size={10} stroke={2.6} className="text-inkSoft" />}
                      </span>
                    </div>
                    <div className="flex-1 -mt-0.5">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className={`text-[11px] font-semibold uppercase tracking-wide ${c.text}`}>{c.label}</span>
                        <span className="text-[11px] text-inkSoft/70">{isMs ? `dia ${e.at} · ${addDays(surgeryDate, e.at)}` : e.range}</span>
                      </div>
                      <h3 className={`text-[15px] font-medium mt-0.5 ${st === 'futuro' ? 'text-inkSoft' : 'text-ink'}`}>{e.title}</h3>
                      <p className="text-[13px] text-inkSoft leading-snug mt-0.5">{e.detail}</p>
                      {showBtn && (
                        <button onClick={() => setTop(e, day, isDoneMs ? null : 'done')}
                          className={`mt-2 text-[13px] font-semibold inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border transition
                            ${isDoneMs ? 'border-sage text-sage bg-sageSoft' : 'border-bronze text-bronzeDeep hover:bg-bronzeSoft'}`}>
                          <Icon d={icons.check} size={13} stroke={2.4} />
                          {isDoneMs ? 'Concluído' : 'Marcar como concluído'}
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </section>
      ))}
    </div>
  );
}

      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   TELA · HISTÓRICO
-----------------------------------------------------------------*/
function HistoryView({ day, surgeryDate, log }) {
  const history = useMemo(() => {
    const out = [];
    for (let d = day; d >= 0; d--) {
      const items = [];
      CARE.forEach(t => {
        if (CHECKABLE.includes(t.kind) && isActiveOn(t, d)) {
          const top = log[topKey(t, d)];
          if (isSkipVal(top)) { items.push({ id: t.id, title: t.title, status: 'skip' }); return; }
          if (isDose(t)) {
            if (isDoneVal(top)) { items.push({ id: t.id, title: t.title, status: 'done', times: [] }); return; }
            const max = maxDoses(t); const times = [];
            for (let i = 0; i < max; i++) { const v = log[doseKey(t, d, i)]; if (isDoneVal(v)) times.push(isTimeVal(v) ? v : null); }
            if (times.length) items.push({ id: t.id, title: t.title, total: reqDoses(t),
              status: times.filter(Boolean).length >= reqDoses(t) || times.length >= reqDoses(t) ? 'done' : 'partial',
              times: times.filter(Boolean).sort() });
          } else if (isDoneVal(top)) {
            items.push({ id: t.id, title: t.title, status: 'done' });
          }
        }
        if (t.kind === 'milestone' && t.start === d) {
          const v = log[t.id];
          if (isSkipVal(v)) items.push({ id: t.id, title: t.title, status: 'skip', milestone: true });
          else if (isDoneVal(v)) items.push({ id: t.id, title: t.title, status: 'done', milestone: true });
        }
      });
      if (items.length) out.push({ d, items });
    }
    return out;
  }, [day, log]);

  return (
    <div className="fade-in max-w-2xl">
      <header className="mb-7">
        <p className="text-[13px] font-semibold uppercase tracking-[0.18em] text-bronze">Registro</p>
        <h1 className="font-serif text-4xl text-ink mt-2">Histórico</h1>
        <p className="text-inkSoft mt-2">O que você marcou em cada dia, com os horários das doses.</p>
      </header>

      {history.length === 0 ? (
        <div className="rounded-2xl border border-line bg-mist p-6 text-center">
          <p className="text-inkSoft text-[14px]">Ainda não há registros. O que você marcar na aba <span className="text-ink font-medium">Hoje</span> aparece aqui, dia a dia.</p>
        </div>
      ) : history.map(({ d, items }) => (
        <section key={d} className="mb-6">
          <div className="flex items-baseline gap-3 mb-2.5">
            <h2 className="font-serif text-lg text-ink">{d === 0 ? 'Dia da cirurgia' : `Dia ${d}`}</h2>
            <span className="text-[12px] text-inkSoft">{addDays(surgeryDate, d)}{d === day ? ' · hoje' : ''}</span>
          </div>
          <div className="rounded-2xl bg-mist border border-line divide-y divide-line overflow-hidden">
            {items.map(it => {
              const hasTimes = it.times && it.times.length > 0;
              return (
                <div key={it.id} className="px-4 py-3 flex items-center justify-between gap-3">
                  <div className="flex items-center gap-2.5 min-w-0">
                    <span className={`w-5 h-5 rounded-md grid place-items-center shrink-0
                      ${it.status === 'skip' ? 'bg-inkSoft/15 text-inkSoft' : it.status === 'partial' ? 'bg-bronzeSoft text-bronzeDeep' : 'bg-sage text-white'}`}>
                      <Icon d={it.status === 'skip' ? icons.x : icons.check} size={12} stroke={2.6} />
                    </span>
                    <span className={`text-[14px] truncate ${it.status === 'skip' ? 'text-inkSoft line-through' : 'text-ink'}`}>{it.title}</span>
                  </div>
                  <span className="text-[13px] font-medium shrink-0 text-right">
                    {it.status === 'skip'
                      ? <span className="text-inkSoft">não fiz</span>
                      : hasTimes
                        ? <><span className="text-bronzeDeep">{it.times.join(' · ')}</span>{it.total > 1 && <span className="text-inkSoft"> ({it.times.length}/{it.total})</span>}</>
                        : it.milestone
                          ? <span className="text-sage">concluído</span>
                          : <span className="text-sage">feito</span>}
                  </span>
                </div>
              );
            })}
          </div>
        </section>
      ))}
    </div>
  );
}

/* ----------------------------------------------------------------
   TELA · FOTOS (dentro do Diário)
-----------------------------------------------------------------*/
function PhotosView({ surgeryDate, photos, onAddPhoto, onDeletePhoto }) {
  const [busy, setBusy] = useState(false);
  const [zoom, setZoom] = useState(null);
  const inputRef = React.useRef(null);
  const sorted = [...photos].sort((a, b) => b.ts - a.ts);

  async function handleFiles(e) {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;
    setBusy(true);
    for (const f of files) { try { const dataUrl = await compressImage(f); await onAddPhoto(dataUrl); } catch (_) {} }
    setBusy(false);
    if (inputRef.current) inputRef.current.value = '';
  }

  return (
    <div className="fade-in">
      <p className="text-inkSoft text-[14px] mb-4 -mt-2">Registre a evolução semana a semana. As fotos ficam só neste aparelho.</p>
      <input ref={inputRef} type="file" accept="image/*" capture="environment" multiple onChange={handleFiles} className="hidden" />
      <button onClick={() => inputRef.current && inputRef.current.click()} disabled={busy}
        className="w-full mb-5 py-3 rounded-xl bg-ink text-porcelain font-semibold text-[14px] flex items-center justify-center gap-2 disabled:opacity-60">
        <Icon d={icons.camera} size={18} /> {busy ? 'Processando…' : 'Adicionar foto'}
      </button>

      {sorted.length === 0 ? (
        <div className="rounded-2xl border border-dashed border-line bg-mist p-8 text-center">
          <Icon d={icons.image} size={28} className="text-line mx-auto" />
          <p className="text-inkSoft text-[14px] mt-3">Nenhuma foto ainda. Que tal registrar como está hoje?</p>
        </div>
      ) : (
        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
          {sorted.map(p => (
            <div key={p.id} className="relative rounded-xl overflow-hidden border border-line bg-mist">
              <button onClick={() => setZoom(p)} className="block w-full aspect-square">
                <img src={p.dataUrl} alt={`Foto do dia ${p.day}`} className="w-full h-full object-cover" />
              </button>
              <div className="absolute inset-x-0 bottom-0 bg-gradient-to-t from-ink/75 to-transparent px-2 py-1.5 flex items-end justify-between">
                <span className="text-[11px] font-semibold text-white">{p.day === 0 ? 'Cirurgia' : `Dia ${p.day}`}</span>
                <button onClick={() => onDeletePhoto(p.id)} aria-label="Excluir foto" className="text-white/80 hover:text-white"><Icon d={icons.trash} size={14} /></button>
              </div>
            </div>
          ))}
        </div>
      )}

      {zoom && (
        <div className="fixed inset-0 z-50 bg-ink/85 grid place-items-center p-4" onClick={() => setZoom(null)}>
          <div className="max-w-lg w-full" onClick={e => e.stopPropagation()}>
            <img src={zoom.dataUrl} className="w-full rounded-xl" alt="" />
            <div className="flex items-center justify-between mt-3">
              <span className="text-porcelain text-[14px] font-medium">{zoom.day === 0 ? 'Dia da cirurgia' : `Dia ${zoom.day}`} · {addDays(surgeryDate, zoom.day)}</span>
              <button onClick={() => { onDeletePhoto(zoom.id); setZoom(null); }} className="text-porcelain/80 hover:text-white inline-flex items-center gap-1.5 text-[13px]"><Icon d={icons.trash} size={15} /> Excluir</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ----------------------------------------------------------------
   Painel · Ajustes (cirurgia + lembretes + backup)
-----------------------------------------------------------------*/
function SettingsSheet({ surgeryDate, dayCount, reminders, onSetSurgeryDate, onSetReminders, onBackup, onRestore, onClose }) {
  const [date, setDate] = useState(surgeryDate);
  const fileRef = React.useRef(null);
  const [perm, setPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'unsupported');

  async function enableNotif() {
    if (typeof Notification === 'undefined') return;
    let p = 'denied';
    try { p = await Notification.requestPermission(); } catch (_) {}
    setPerm(p);
    onSetReminders({ ...reminders, enabled: p === 'granted', times: reminders.times && reminders.times.length ? reminders.times : ['08:00', '20:00'] });
  }
  const setTime = (i, v) => { const times = [...reminders.times]; times[i] = v; onSetReminders({ ...reminders, times }); };
  const addTime = () => onSetReminders({ ...reminders, times: [...(reminders.times || []), '12:00'] });
  const removeTime = (i) => onSetReminders({ ...reminders, times: reminders.times.filter((_, idx) => idx !== i) });

  return (
    <div className="fixed inset-0 z-50 bg-ink/40 flex items-end md:items-center justify-center md:p-4" onClick={onClose}>
      <div className="bg-porcelain w-full md:max-w-md rounded-t-2xl md:rounded-2xl max-h-[92vh] overflow-y-auto shadow-card fade-in" onClick={e => e.stopPropagation()}>
        <div className="sticky top-0 bg-porcelain px-5 py-4 border-b border-line flex items-center justify-between">
          <h2 className="font-serif text-2xl text-ink">Ajustes</h2>
          <button onClick={onClose} aria-label="Fechar" className="text-inkSoft p-1"><Icon d={icons.x} size={20} /></button>
        </div>
        <div className="p-5 space-y-7">
          <section>
            <h3 className="text-[12px] font-semibold uppercase tracking-wide text-bronze mb-2">Data da cirurgia</h3>
            <p className="text-[13px] text-inkSoft mb-2">Define o "Dia 0". Hoje é o dia {dayCount}.</p>
            <div className="flex gap-2">
              <input type="date" value={date} onChange={e => setDate(e.target.value)} className="flex-1 rounded-xl border border-line bg-mist px-3 py-2.5 text-[15px] text-ink focus:outline-none focus:border-bronze" />
              <button onClick={() => onSetSurgeryDate(date)} className="px-4 rounded-xl bg-ink text-porcelain font-semibold text-[14px]">Salvar</button>
            </div>
          </section>

          <section>
            <h3 className="text-[12px] font-semibold uppercase tracking-wide text-bronze mb-2">Lembretes</h3>
            {perm === 'unsupported' ? (
              <p className="text-[13px] text-inkSoft">Este aparelho não suporta notificações.</p>
            ) : perm !== 'granted' ? (
              <button onClick={enableNotif} className="w-full py-2.5 rounded-xl border border-bronze text-bronzeDeep font-semibold text-[14px] flex items-center justify-center gap-2">
                <Icon d={icons.bell} size={16} /> Ativar notificações
              </button>
            ) : (
              <>
                <div className="space-y-2">
                  {(reminders.times || []).map((tm, i) => (
                    <div key={i} className="flex items-center gap-2">
                      <input type="time" value={tm} onChange={e => setTime(i, e.target.value)} className="flex-1 rounded-xl border border-line bg-mist px-3 py-2 text-[15px] text-ink focus:outline-none focus:border-bronze" />
                      <button onClick={() => removeTime(i)} aria-label="Remover horário" className="w-9 h-9 grid place-items-center rounded-xl border border-line text-inkSoft"><Icon d={icons.trash} size={16} /></button>
                    </div>
                  ))}
                </div>
                <button onClick={addTime} className="mt-2 text-[13px] font-semibold text-bronzeDeep inline-flex items-center gap-1"><Icon d={icons.plus} size={14} /> Adicionar horário</button>
              </>
            )}
            <p className="text-[12px] text-inkSoft mt-2 leading-snug">Os lembretes tocam de forma confiável com o app aberto. No iPhone, notificações em segundo plano são limitadas — por isso cada remédio também mostra a próxima dose.</p>
          </section>

          <section>
            <h3 className="text-[12px] font-semibold uppercase tracking-wide text-bronze mb-2">Backup dos dados</h3>
            <p className="text-[13px] text-inkSoft mb-3">Salve uma cópia das suas marcações e horários. Guarde o arquivo num lugar seguro (e-mail, nuvem). As fotos ficam separadas, no aparelho.</p>
            <div className="flex gap-2">
              <button onClick={onBackup} className="flex-1 py-2.5 rounded-xl bg-ink text-porcelain font-semibold text-[14px] flex items-center justify-center gap-2"><Icon d={icons.download} size={16} /> Baixar</button>
              <button onClick={() => fileRef.current && fileRef.current.click()} className="flex-1 py-2.5 rounded-xl border border-line text-ink font-semibold text-[14px] flex items-center justify-center gap-2"><Icon d={icons.upload} size={16} /> Restaurar</button>
            </div>
            <input ref={fileRef} type="file" accept="application/json,.json" className="hidden" onChange={e => { const f = e.target.files && e.target.files[0]; if (f) onRestore(f); e.target.value = ''; }} />
          </section>

          <section className="border-t border-line pt-5">
            <p className="text-[12px] text-inkSoft leading-snug">Instituto Milhomem · Dr. Pablo Milhomem. Este app organiza suas orientações e não substitui a equipe médica.</p>
          </section>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------------
   APP
-----------------------------------------------------------------*/
const NAV = [
  { id: 'hoje', label: 'Hoje', short: 'Hoje', icon: icons.today },
  { id: 'jornada', label: 'Jornada', short: 'Jornada', icon: icons.journey },
  { id: 'medicamentos', label: 'Medicamentos', short: 'Remédios', icon: icons.pill },
  { id: 'diario', label: 'Diário', short: 'Diário', icon: icons.image },
  { id: 'contato', label: 'Contato', short: 'Contato', icon: icons.phone },
];

function App() {
  const initial = loadState() || {};
  const [log, setLogState] = useState(initial.done || {});
  const [surgeryDate, setSurgeryDate] = useState(initial.surgeryDate || '2026-06-19');
  const [reminders, setReminders] = useState(initial.reminders || { enabled: false, times: ['08:00', '20:00'] });
  const [view, setView] = useState('hoje');
  const [showSettings, setShowSettings] = useState(false);
  const [photos, setPhotos] = useState([]);
  const [updateReady, setUpdateReady] = useState(false);
  const swWaiting = React.useRef(null);
  const firedRef = React.useRef({});

  const today = daysSince(surgeryDate);
  const [viewDay, setViewDay] = useState(today);

  // persiste marcações, data e lembretes
  useEffect(() => { saveState({ done: log, surgeryDate, reminders }); }, [log, surgeryDate, reminders]);

  // carrega fotos do IndexedDB
  useEffect(() => { photoAll().then(setPhotos).catch(() => {}); }, []);

  // nova versão disponível (acionado pelo registrador do service worker)
  useEffect(() => {
    window.__appUpdateReady = (worker) => { swWaiting.current = worker; setUpdateReady(true); };
    return () => { delete window.__appUpdateReady; };
  }, []);

  // lembretes — tocam com o app aberto
  useEffect(() => {
    if (!reminders.enabled || typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
    const tick = () => {
      const hm = nowHM();
      const key = new Date().toDateString() + ' ' + hm;
      if ((reminders.times || []).includes(hm) && !firedRef.current[key]) {
        firedRef.current[key] = true;
        try { new Notification('Recuperação capilar', { body: 'Hora de conferir seus cuidados de hoje.', icon: 'icon-192.png' }); } catch (_) {}
      }
    };
    tick();
    const iv = setInterval(tick, 20000);
    return () => clearInterval(iv);
  }, [reminders]);

  const setLog = (key, value) => setLogState(prev => {
    const next = { ...prev };
    if (value === null || value === undefined) delete next[key]; else next[key] = value;
    return next;
  });
  const setTop = (t, d, value) => setLog(topKey(t, d), value);
  const skipTask = (t, d) => setLogState(prev => {
    const next = { ...prev };
    const tk = topKey(t, d);
    if (isSkipVal(next[tk])) { delete next[tk]; }
    else {
      next[tk] = 'skip';
      const max = maxDoses(t);
      for (let i = 0; i < max; i++) delete next[doseKey(t, d, i)];
    }
    return next;
  });

  // fotos
  const addPhoto = async (dataUrl) => {
    const photo = { id: 'p' + Date.now() + Math.random().toString(36).slice(2, 6), dataUrl, day: today, ts: Date.now() };
    try { await photoAdd(photo); setPhotos(prev => [...prev, photo]); } catch (_) {}
  };
  const deletePhoto = async (id) => {
    try { await photoDelete(id); setPhotos(prev => prev.filter(p => p.id !== id)); } catch (_) {}
  };

  // backup / restaurar
  const doBackup = () => {
    const data = { app: 'recuperacao-capilar', version: 2, exportedAt: new Date().toISOString(), surgeryDate, reminders, log };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `recuperacao-backup-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };
  const doRestore = (file) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || typeof data.log !== 'object' || !data.surgeryDate) throw new Error('inválido');
        if (!window.confirm('Restaurar este backup substitui as marcações atuais. Continuar?')) return;
        setLogState(data.log || {});
        setSurgeryDate(data.surgeryDate);
        if (data.reminders) setReminders(data.reminders);
        setViewDay(daysSince(data.surgeryDate));
        setShowSettings(false);
      } catch (e) { window.alert('Não foi possível ler este arquivo de backup.'); }
    };
    reader.readAsText(file);
  };

  const applyUpdate = () => {
    if (swWaiting.current) { try { swWaiting.current.postMessage({ type: 'SKIP_WAITING' }); } catch (_) { window.location.reload(); } }
    else window.location.reload();
  };
  const saveSurgeryDate = (d) => { setSurgeryDate(d); setViewDay(daysSince(d)); setShowSettings(false); };

  const views = {
    hoje: <HojeView day={viewDay} today={today} setViewDay={setViewDay} surgeryDate={surgeryDate} log={log} setLog={setLog} setTop={setTop} skipTask={skipTask} />,
    jornada: <JornadaView day={today} surgeryDate={surgeryDate} log={log} setTop={setTop} />,
    medicamentos: <MedsView day={today} surgeryDate={surgeryDate} log={log} setLog={setLog} setTop={setTop} skipTask={skipTask} />,
    diario: <DiarioView day={today} surgeryDate={surgeryDate} log={log} photos={photos} onAddPhoto={addPhoto} onDeletePhoto={deletePhoto} />,
    contato: <ContatoView />,
  };

  return (
    <div className="min-h-screen md:flex">
      <aside className="hidden md:flex md:flex-col w-64 shrink-0 border-r border-line bg-porcelain/60 sticky top-0 h-screen p-6">
        <div className="flex items-center gap-2.5 mb-9">
          <span className="w-9 h-9 rounded-full border-2 border-bronze grid place-items-center font-serif text-bronze text-lg">M</span>
          <div className="leading-tight">
            <p className="font-serif text-[17px] text-ink">Recuperação</p>
            <p className="text-[11px] text-inkSoft uppercase tracking-wide">Transplante capilar</p>
          </div>
        </div>
        <nav className="space-y-1">
          {NAV.map(n => (
            <button key={n.id} onClick={() => setView(n.id)}
              className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-[14.5px] font-medium transition
                ${view === n.id ? 'bg-ink text-porcelain' : 'text-inkSoft hover:bg-porcelain hover:text-ink'}`}>
              <Icon d={n.icon} size={19} stroke={view === n.id ? 1.8 : 1.6} />{n.label}
            </button>
          ))}
        </nav>
        <div className="mt-auto pt-6 border-t border-line">
          <button onClick={() => setShowSettings(true)} className="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] text-inkSoft hover:text-ink transition">
            <Icon d={icons.gear} size={16} /> Cirurgia: {addDays(surgeryDate, 0)}
          </button>
          <p className="text-[11px] text-inkSoft/70 mt-3 px-3 leading-snug">Instituto Milhomem · Dr. Pablo Milhomem</p>
        </div>
      </aside>

      <main className="flex-1 min-w-0">
        <div className="md:hidden sticky top-0 z-30 bg-porcelain/90 backdrop-blur border-b border-line px-5 py-3.5 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <span className="w-7 h-7 rounded-full border-2 border-bronze grid place-items-center font-serif text-bronze text-sm">M</span>
            <span className="font-serif text-[16px] text-ink">Recuperação</span>
          </div>
          <button onClick={() => setShowSettings(true)} className="text-inkSoft p-1" aria-label="Configurar data da cirurgia"><Icon d={icons.gear} size={20} /></button>
        </div>
        <div className="px-5 md:px-12 py-7 md:py-12 pb-28 md:pb-12">{views[view]}</div>
      </main>

      <nav className="md:hidden fixed bottom-0 inset-x-0 z-40 bg-mist border-t border-line grid grid-cols-5 px-1 pt-1.5 pb-[calc(0.4rem+env(safe-area-inset-bottom))]">
        {NAV.map(n => (
          <button key={n.id} onClick={() => setView(n.id)}
            className={`flex flex-col items-center gap-1 py-1.5 rounded-lg text-[10px] font-medium transition ${view === n.id ? 'text-bronzeDeep' : 'text-inkSoft'}`}>
            <Icon d={n.icon} size={20} stroke={view === n.id ? 2 : 1.6} /><span className="truncate max-w-full leading-none">{n.short}</span>
          </button>
        ))}
      </nav>

      {updateReady && (
        <div className="fixed top-3 inset-x-3 md:inset-x-auto md:right-4 md:w-80 z-[60] bg-ink text-porcelain rounded-xl shadow-card p-3 flex items-center gap-3 fade-in">
          <Icon d={icons.repeat} size={18} className="text-bronzeSoft shrink-0" />
          <span className="text-[13px] flex-1 leading-snug">Nova versão disponível.</span>
          <button onClick={applyUpdate} className="text-[13px] font-semibold bg-porcelain text-ink px-3 py-1.5 rounded-lg">Atualizar</button>
        </div>
      )}

      {showSettings && (
        <SettingsSheet surgeryDate={surgeryDate} dayCount={today} reminders={reminders}
          onSetSurgeryDate={saveSurgeryDate} onSetReminders={setReminders}
          onBackup={doBackup} onRestore={doRestore} onClose={() => setShowSettings(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').then(function (reg) {
        function notify(w) { if (w && window.__appUpdateReady) window.__appUpdateReady(w); }
        if (reg.waiting && navigator.serviceWorker.controller) notify(reg.waiting);
        reg.addEventListener('updatefound', function () {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function () {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) notify(nw);
          });
        });
      }).catch(function () {});
      var reloaded = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (reloaded) return; reloaded = true; window.location.reload();
      });
    });
  }
</script>
